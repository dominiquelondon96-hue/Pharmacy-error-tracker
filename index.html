<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Error Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f1f5f9;min-height:100vh;padding:16px}
.wrap{max-width:1200px;margin:0 auto}
.hdr{background:#1e40af;border-radius:12px;padding:16px 24px;margin-bottom:14px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:20px;font-weight:800;margin:0}
.hdr p{font-size:12px;opacity:.75;margin-top:2px}
.hdr-r{text-align:right;font-size:12px;color:#fff}
.big{font-size:22px;font-weight:800}
.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.nav button{padding:7px 13px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#475569}
.nav button.on{background:#4f46e5;color:#fff}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px}
.kpi-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.kpi{background:#fff;border-radius:10px;padding:11px 14px;border-left:4px solid #6366f1;min-width:120px;flex-grow:1}
.kpi .lb{font-size:10px;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.kpi .vl{font-size:20px;font-weight:800;color:#1e293b}
.kpi .sub{font-size:10px;color:#94a3b8;margin-top:1px}
.sec{display:none}.sec.on{display:block}
label.flb{display:block;font-size:11px;color:#64748b;font-weight:600;margin-bottom:3px;margin-top:10px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;color:#1e293b;background:#f8fafc;box-sizing:border-box}
textarea{resize:vertical}
.btn{padding:9px 16px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-full{width:100%;display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 10px;text-align:left;color:#fff;font-weight:600;font-size:11px;white-space:nowrap;background:#1e40af}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9}
tr.alt td{background:#f8fafc}
.bdg{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;display:inline-block;white-space:nowrap}
.tbl-wrap{overflow-x:auto}
.wk-btn{padding:5px 11px;border-radius:7px;border:1px solid #e2e8f0;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#374151;margin:2px}
.wk-btn.on{background:#1e40af;color:#fff}
.tfr td{background:#1e40af;color:#fff;font-weight:700;padding:8px 12px;text-align:center}
.tfr td:first-child{text-align:left}
.ii{width:46px;padding:3px 6px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;text-align:center;background:#fffbeb}
.fgrid{display:flex;gap:12px;flex-wrap:wrap}
.fhalf{width:47%;min-width:180px}
.fbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 14px}
.sbx{font-size:11px;background:#f1f5f9;border-radius:6px;padding:6px 10px;min-width:120px}
.ch-wrap{position:relative;width:100%}
.toggle-group{display:flex;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.tgl{padding:5px 14px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#475569}
.tgl.on{background:#4f46e5;color:#fff}
.alert-card{border-radius:10px;padding:12px 16px;margin-bottom:10px;border-left:4px solid #ef4444;background:#fff}
.alert-card.warn{border-left-color:#f59e0b}
.alert-card.good{border-left-color:#10b981}
.section-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;overflow-y:auto}
.modal-box{background:#fff;border-radius:12px;padding:24px;max-width:560px;margin:40px auto}
.admin-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9}
.sync-bar{border-radius:8px;padding:10px 16px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;transition:background .3s}
.sync-bar.synced{background:#1e40af;color:#fff}
.sync-bar.saving{background:#f59e0b;color:#1a1a1a}
.sync-bar.error{background:#ef4444;color:#fff}
.sync-bar.loading{background:#6366f1;color:#fff}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.sync-dot.green{background:#4ade80}
.sync-dot.yellow{background:#fef08a;animation:pulse .8s infinite}
.sync-dot.red{background:#fca5a5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-actions{display:flex;gap:8px;align-items:center}
.sync-btn{padding:4px 12px;border:1px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.sync-btn:hover{background:rgba(255,255,255,.2)}
.sync-bar.saving .sync-btn{border-color:rgba(0,0,0,.2);color:#1a1a1a}
.rph-tag{display:inline-flex;align-items:center;gap:4px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;margin:2px}
.rph-tag button{background:none;border:none;cursor:pointer;color:#93c5fd;font-size:13px;line-height:1;padding:0}
.rph-tag button:hover{color:#ef4444}
.rph-box{min-height:36px;border:1px solid #e2e8f0;border-radius:7px;padding:4px 8px;background:#f8fafc;display:flex;flex-wrap:wrap;gap:4px;align-items:center;cursor:text}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1>Pharmacy Error Tracker</h1><p>Real-time intake error monitoring · Human · Bot · API</p></div>
    <div class="hdr-r"><div class="big" id="hTot">0</div><div id="hMode">This Week</div><div style="color:#fca5a5" id="hPnd">0 Pending</div></div>
  </div>
  <div id="syncBar" class="sync-bar loading">
    <span><span class="sync-dot yellow" id="syncDot"></span><span id="syncMsg">Connecting to cloud…</span></span>
    <div class="sync-actions">
      <button class="sync-btn" onclick="forceSave()">💾 Save Now</button>
      <button class="sync-btn" onclick="exportData()">⬇ Export Backup</button>
    </div>
  </div>
  <div class="nav" id="navBar"></div>
  <div id="sec-dashboard" class="sec on"></div>
  <div id="sec-summary" class="sec"></div>
  <div id="sec-trends" class="sec"></div>
  <div id="sec-rph" class="sec"></div>
  <div id="sec-staff" class="sec"></div>
  <div id="sec-member" class="sec"></div>
  <div id="sec-log" class="sec"></div>
  <div id="sec-import" class="sec"></div>
  <div id="sec-entries" class="sec"></div>
  <div id="sec-admin" class="sec"></div>
  <div id="editModal" class="modal-bg">
    <div class="modal-box">
      <h3 style="font-size:16px;color:#1e293b;margin-bottom:16px">Edit Error Entry</h3>
      <div class="fgrid">
        <div class="fhalf"><label class="flb" style="margin-top:0">Date</label><input type="date" id="eDt"></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Error Type</label><select id="eTy"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Source</label><select id="eSr" onchange="upEF()"></select></div>
        <div class="fhalf" id="eTmW"><label class="flb" style="margin-top:0">Team</label><select id="eTm" onchange="upEW()"></select></div>
        <div class="fhalf" id="eWhW"><label class="flb" style="margin-top:0">Who</label><select id="eWh"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Fax/eRx</label><select id="eFx"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Drug</label><select id="eDrug"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">RX Number</label><input type="text" id="eRx"></div>
      </div>
      <label class="flb">Notes</label><textarea id="eNt" rows="2"></textarea>
      <!-- Good Catch section -->
      <div style="margin-top:12px;padding:12px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0">
        <div style="font-size:11px;font-weight:700;color:#15803d;margin-bottom:8px">✅ Good Catch</div>
        <div class="fgrid">
          <div class="fhalf">
            <label class="flb" style="margin-top:0">Caught &amp; reported by someone?</label>
            <select id="eGC" onchange="upEditGCFields()">
              <option value="">-- Select --</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>
        <div id="eGCDetails" style="display:none">
          <div class="fgrid" style="margin-top:6px">
            <div class="fhalf">
              <label class="flb" style="margin-top:0">Which team?</label>
              <select id="eGCTeam" onchange="upEditGCTeam()"></select>
            </div>
            <div class="fhalf">
              <label class="flb" style="margin-top:0">Who specifically?</label>
              <select id="eGCWho"><option value="">-- Select team first --</option></select>
            </div>
          </div>
        </div>
      </div>
      <!-- Dispensed with Error section -->
      <div style="margin-top:8px;padding:12px;background:#fff7ed;border-radius:8px;border:1px solid #fed7aa">
        <div style="font-size:11px;font-weight:700;color:#c2410c;margin-bottom:8px">⚠ Dispensed with Error</div>
        <div class="fgrid">
          <div class="fhalf">
            <label class="flb" style="margin-top:0">Verified by RPH &amp; dispensed with error?</label>
            <select id="eRphVerified" onchange="upEditRphFields()">
              <option value="">-- Select --</option>
              <option value="Yes">Yes — dispensed with error</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="fhalf" id="eRphCountW" style="display:none">
            <label class="flb" style="margin-top:0">How many times?</label>
            <input type="number" id="eRphCount" min="1" max="20" placeholder="e.g. 2">
          </div>
        </div>
        <div id="eRphNamesW" style="display:none">
          <label class="flb">Which RPH(s)?</label>
          <div style="display:flex;gap:6px;margin-top:4px">
            <select id="eRphSel" style="flex:1"></select>
            <button type="button" onclick="addEditRph()" style="padding:6px 14px;background:#c2410c;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">Add</button>
          </div>
          <div id="eRphTags" class="rph-box" style="margin-top:6px"></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-full" onclick="saveEdit()">Save Changes</button>
        <button onclick="closeEdit()" style="padding:9px 16px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;flex:1;margin-top:10px">Cancel</button>
      </div>
    </div>
  </div>
</div>
<script>
// ── JSONBin Config ─────────────────────────────────────────────────────────
var BIN_ID="69de7f0d856a682189337141";
var API_KEY="$2a$10$CYBsfBEtDArtHF/.GLAFG.ijVKYwl0jed/Eqelj4gIBsPjfIwf8Qq";
var BIN_URL="https://api.jsonbin.io/v3/b/"+BIN_ID;

// ── App Data ───────────────────────────────────────────────────────────────
var ET=["Incorrect Refills","Invalid Rx","Drug Mismatch","Wrong DAW","Wrong Prescriber","Wrong Quantity","Wrong Quick Sig","Entered Under Wrong PT","Self Prescribed","Wrong Written Date","Wrong Patient"];
var TM=["Intake","PCR 3","TLAC","Ups","RPH"];
var SR=["Human","Bot","API"];
var TC=["#6366f1","#f59e0b","#10b981","#ef4444","#3b82f6","#ec4899","#8b5cf6","#14b8a6","#f97316","#64748b","#a855f7"];
var TLC={Intake:"#6366f1","PCR 3":"#f59e0b",TLAC:"#10b981",Ups:"#ef4444",RPH:"#3b82f6",Bot:"#8b5cf6",API:"#ec4899"};
var SM={Intake:[],"PCR 3":[],TLAC:[],Ups:[],RPH:[]};
var FX=["New Erx","Refill Response","Fax","Verbal","Transfer"];
var DRUGS=["Metformin 500mg","Metformin 1000mg","Lisinopril 10mg","Ozempic 0.5mg","Ozempic 1mg","Ozempic 2mg","Mounjaro 5mg","Mounjaro 10mg","Wegovy 1.7mg","Semaglutide 7.5mg","Humira 40mg","Lantus 100u","Jardiance 10mg","Tirzepatide 7.5mg"];
var idS=Date.now();
function mkId(){return idS++;}
function fmtD(d){var m=d.getMonth()+1,dy=d.getDate();return d.getFullYear()+"-"+(m<10?"0"+m:m)+"-"+(dy<10?"0"+dy:dy);}
function getWk(ds){try{var d=new Date(ds),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}catch(e){return 1;}}
function tyC(t){var i=ET.indexOf(t);return i>=0?TC[i]:"#6366f1";}
function bdg(txt,col){return'<span class="bdg" style="background:'+col+'33;color:'+col+'">'+txt+'</span>';}
function allWks(){var w={};for(var i=0;i<D.length;i++)w[D[i].week]=1;return Object.keys(w).map(Number).sort(function(a,b){return a-b;});}
function tmOpts(sel){var h="";for(var i=0;i<TM.length;i++)h+='<option'+(TM[i]===sel?" selected":"")+'>'+TM[i]+'</option>';return h;}
function etOpts(sel){var h="";for(var i=0;i<ET.length;i++)h+='<option'+(ET[i]===sel?" selected":"")+'>'+ET[i]+'</option>';return h;}
function srOpts(sel){var h="";for(var i=0;i<SR.length;i++)h+='<option'+(SR[i]===sel?" selected":"")+'>'+SR[i]+'</option>';return h;}
function fxOpts(sel){var h="";for(var i=0;i<FX.length;i++)h+='<option'+(FX[i]===sel?" selected":"")+'>'+FX[i]+'</option>';return h;}
function whoOpts(team,sel){var h='<option value="">Select</option>';var n=SM[team]||[];for(var i=0;i<n.length;i++)h+='<option'+(n[i]===sel?" selected":"")+'>'+n[i]+'</option>';return h;}
function drugOpts(sel){var h='<option value="">-- Select Drug --</option>';for(var i=0;i<DRUGS.length;i++)h+='<option'+(DRUGS[i]===sel?" selected":"")+'>'+DRUGS[i]+'</option>';h+='<option value="__other__">Other (type below)</option>';return h;}
function dChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function getSubset(){if(dashMode==="daily")return D.filter(function(e){return e.date===todayStr;});if(dashMode==="weekly")return D.filter(function(e){return e.week===thisWk;});return D;}

var D=[],FBI={};
var curV="dashboard",dashMode="weekly",selWk=null,trendM="weekly";
var mvTm="All",mvWho="",mvTy="All",mvWk="All";
var eFF="All",eFT="All",eFS="All",eFSt="All";
var charts={},editId=null;
var today=new Date(),todayStr=fmtD(today),thisWk=getWk(todayStr);
var saveTimer=null;

// ── Sync UI ────────────────────────────────────────────────────────────────
function setSyncUI(status,msg){
  var bar=document.getElementById("syncBar");
  var dot=document.getElementById("syncDot");
  bar.className="sync-bar "+status;
  document.getElementById("syncMsg").textContent=msg;
  dot.className="sync-dot "+(status==="synced"?"green":status==="error"?"red":"yellow");
}

// ── JSONBin API ────────────────────────────────────────────────────────────
function getPayload(){
  return {D:D,FBI:FBI,SM:SM,DRUGS:DRUGS,ET:ET,TM:TM,ts:Date.now()};
}

function applyPayload(p){
  if(p.D)D=p.D;
  if(p.FBI)FBI=p.FBI;
  if(p.SM)SM=p.SM;
  if(p.DRUGS&&p.DRUGS.length)DRUGS=p.DRUGS;
  if(p.ET&&p.ET.length)ET=p.ET;
  if(p.TM&&p.TM.length)TM=p.TM;
}

function lsSave(){try{localStorage.setItem("pet_v1",JSON.stringify(getPayload()));}catch(e){}}
function lsLoad(){try{var r=localStorage.getItem("pet_v1");if(r)applyPayload(JSON.parse(r));}catch(e){}}

async function jbLoad(){
  setSyncUI("loading","Loading data from cloud…");
  try{
    var res=await fetch(BIN_URL+"/latest",{
      headers:{"X-Access-Key":API_KEY,"X-Bin-Meta":false}
    });
    if(!res.ok)throw new Error("HTTP "+res.status);
    var json=await res.json();
    // JSONBin wraps response in {record:{...}} — handle both
    var data=json.record||json;
    applyPayload(data);
    lsSave();
    var t=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    setSyncUI("synced","☁ Synced · "+D.length+" entries · Works on any browser · Last loaded: "+t);
  }catch(err){
    console.warn("JSONBin load failed:",err);
    lsLoad();
    setSyncUI("error","Cloud load failed — using local backup. Check your connection.");
  }
}

async function jbSave(){
  lsSave();
  setSyncUI("saving","Saving to cloud…");
  try{
    var res=await fetch(BIN_URL,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Access-Key":API_KEY},
      body:JSON.stringify(getPayload())
    });
    if(!res.ok)throw new Error("HTTP "+res.status);
    var t=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    setSyncUI("synced","☁ Saved to cloud · "+D.length+" entries · Last saved: "+t);
  }catch(err){
    console.warn("JSONBin save failed:",err);
    setSyncUI("error","Cloud save failed — saved locally. Will retry on next change.");
  }
}

// Debounced — waits 1.5s after last change
function save(){
  lsSave();
  if(saveTimer)clearTimeout(saveTimer);
  setSyncUI("saving","Saving…");
  saveTimer=setTimeout(function(){jbSave();},1500);
}

function forceSave(){
  if(saveTimer)clearTimeout(saveTimer);
  jbSave();
}

function exportData(){
  var blob=new Blob([JSON.stringify(getPayload(),null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="pharmacy-tracker-backup-"+fmtD(new Date())+".json";
  a.click();
}

// ── Nav ────────────────────────────────────────────────────────────────────
var NAVS=[{k:"dashboard",l:"Dashboard"},{k:"summary",l:"Summary"},{k:"trends",l:"Trends"},{k:"rph",l:"RPH Report"},{k:"staff",l:"Staff"},{k:"member",l:"Member View"},{k:"log",l:"Log Error"},{k:"import",l:"Import"},{k:"entries",l:"All Entries"},{k:"admin",l:"Admin"}];
function buildNav(){var h="";for(var i=0;i<NAVS.length;i++)h+='<button class="'+(NAVS[i].k===curV?"on":"")+'" onclick="goTo(\''+NAVS[i].k+'\')">'+NAVS[i].l+'</button>';document.getElementById("navBar").innerHTML=h;}
function goTo(v){curV=v;var ss=document.querySelectorAll(".sec");for(var i=0;i<ss.length;i++)ss[i].classList.remove("on");document.getElementById("sec-"+v).classList.add("on");buildNav();render(v);}
function render(v){var fn={dashboard:rDash,summary:rSum,trends:rTrend,rph:rRph,staff:rStaff,member:rMember,log:rLog,"import":rImport,entries:rEntries,admin:rAdmin};if(fn[v])fn[v]();}
function upHdr(){var sub=getSubset();document.getElementById("hTot").textContent=sub.length;document.getElementById("hPnd").textContent=(D.length-Object.keys(FBI).length)+" Pending";document.getElementById("hMode").textContent=dashMode==="daily"?"Today":dashMode==="weekly"?"This Week":"All Time";}

// ── Dashboard ──────────────────────────────────────────────────────────────
function rDash(){
  var sec=document.getElementById("sec-dashboard");
  var sub=getSubset();
  var human=sub.filter(function(e){return e.source==="Human";}).length;
  var bot=sub.filter(function(e){return e.source==="Bot";}).length;
  var api=sub.filter(function(e){return e.source==="API";}).length;
  // RPH stats — only "dispensed_with_error" counts as risk
  var dispensedWithError=sub.filter(function(e){return e.dispensedWithError==="Yes"||e.rphVerified==="dispensed_with_error";});
  var goodCatches=sub.filter(function(e){return e.goodCatch==="Yes"||e.rphVerified==="good_catch";});
  var rphVerifiedCount=dispensedWithError.length; // primary risk metric
  var rphGoodCount=goodCatches.length;
  var rphPct=sub.length?Math.round(dispensedWithError.length/sub.length*100):0;
  var rphErrors=sub.filter(function(e){return e.source==="Human"&&e.team==="RPH";}).length;
  var etC={};for(var i=0;i<sub.length;i++){etC[sub[i].errorType]=(etC[sub[i].errorType]||0)+1;}
  var topET="None",topEV=0;for(var k in etC){if(etC[k]>topEV){topEV=etC[k];topET=k;}}
  var tmC={};for(var i2=0;i2<sub.length;i2++){if(sub[i2].source==="Human"&&sub[i2].team)tmC[sub[i2].team]=(tmC[sub[i2].team]||0)+1;}
  var topTM="None",topTV=0;for(var k2 in tmC){if(tmC[k2]>topTV){topTV=tmC[k2];topTM=k2;}}
  var stC={};for(var i3=0;i3<sub.length;i3++){if(sub[i3].who)stC[sub[i3].who]=(stC[sub[i3].who]||0)+1;}
  var topST="None",topSV=0;for(var k3 in stC){if(stC[k3]>topSV){topSV=stC[k3];topST=k3;}}
  var prev=dashMode==="daily"?D.filter(function(e){var yd=new Date(today);yd.setDate(today.getDate()-1);return e.date===fmtD(yd);}):dashMode==="weekly"?D.filter(function(e){return e.week===thisWk-1;}):[];
  var delta=sub.length-prev.length;
  var dStr=delta===0?"Same as last "+(dashMode==="daily"?"day":"week"):delta>0?"+"+delta+" vs last "+(dashMode==="daily"?"day":"week"):delta+" vs last "+(dashMode==="daily"?"day":"week");
  var dCol=delta>0?"#ef4444":delta<0?"#10b981":"#94a3b8";

function subLog(){
  var src=document.getElementById("lSr").value,date=document.getElementById("lDt").value;
  if(!date){alert("Please select a date.");return;}
  var ds=document.getElementById("lDrugSel").value;
  var drug=ds==="__other__"?document.getElementById("lDrug").value.trim():ds;
  // Good Catch fields
  var gcVal=document.getElementById("lGC").value||"";
  var gcTeam="",gcWho="";
  if(gcVal==="Yes"){
    gcTeam=document.getElementById("lGCTeam").value||"";
    gcWho=document.getElementById("lGCWho").value||"";
  }
  // Dispensed with Error fields
  var dweVal=document.getElementById("lDWE").value||"";
  var rphCount="",rphNames=[];
  if(dweVal==="Yes"){
    rphCount=document.getElementById("lRphCount").value.trim();
    rphNames=getLogRphs();
  }
  var row={};
  row.id=mkId();row.date=date;row.week=getWk(date);
  row.errorType=document.getElementById("lTy").value;
  row.source=src;
  row.team=src==="Human"?document.getElementById("lTm").value:"";
  row.who=src==="Human"?document.getElementById("lWh").value:"";
  row.faxErx=document.getElementById("lFx").value;
  row.drug=drug;
  row.rxNum=document.getElementById("lRx").value.trim();
  row.notes=document.getElementById("lNt").value;
  // Good Catch
  row.goodCatch=gcVal;
  row.gcTeam=gcTeam;
  row.gcWho=gcWho;
  // Dispensed with Error
  row.dispensedWithError=dweVal;
  row.rphCount=rphCount;
  row.rphNames=rphNames;
  // keep rphVerified for legacy compat
  row.rphVerified=dweVal==="Yes"?"dispensed_with_error":(gcVal==="Yes"?"good_catch":"");
  D.unshift(row);save();upHdr();rLog();alert("Error logged successfully.");
}

function rImport(){
  document.getElementById("sec-import").innerHTML='<div class="card" style="max-width:640px"><h3 style="font-size:15px;margin-bottom:6px">Import / Load Backup</h3><p style="font-size:12px;color:#64748b;margin-bottom:14px">Load a previously exported JSON backup file to restore data.</p><label class="flb" style="margin-top:0">Load JSON Export File</label><input type="file" accept=".json" id="jsonF" onchange="loadJSON(this)"><hr style="margin:20px 0;border:none;border-top:1px solid #e2e8f0"><h3 style="font-size:15px;margin-bottom:6px">Import via CSV</h3><p style="font-size:12px;color:#64748b;margin-bottom:14px">Columns: date, errorType, source, team, who, faxErx, drug, rxNum, notes</p><label class="flb" style="margin-top:0">Upload CSV File</label><input type="file" accept=".csv" id="csvF" onchange="loadCSVF(this)"><label class="flb">Or Paste Rows</label><textarea id="blkT" rows="6" placeholder="Paste CSV rows here..." style="font-family:monospace;font-size:11px"></textarea><div id="blkM" style="font-size:12px;color:#10b981;font-weight:600;margin:6px 0"></div><button class="btn btn-full" onclick="impBulk()">Import CSV Rows</button></div>';
}
function loadJSON(input){
  var f=input.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var payload=JSON.parse(e.target.result);
      applyPayload(payload);
      save();upHdr();render(curV);
      alert("Data loaded successfully. "+D.length+" entries.");
    }catch(err){alert("Error loading file.");}
  };
  r.readAsText(f);
}
function loadCSVF(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){document.getElementById("blkT").value=e.target.result;};r.readAsText(f);}
function impBulk(){
  var lines=document.getElementById("blkT").value.trim().split("\n"),added=0,skipped=0;
  for(var i=0;i<lines.length;i++){var p=lines[i].split(",");if(p.length<3){skipped++;continue;}var date=p[0].trim(),et=p[1].trim(),src=p[2].trim();if(!date||!et||!src){skipped++;continue;}var row={};row.id=mkId();row.date=date;row.week=getWk(date);row.errorType=et;row.source=SR.indexOf(src)>=0?src:"Human";row.team=TM.indexOf((p[3]||"").trim())>=0?(p[3]||"").trim():"";row.who=(p[4]||"").trim();row.faxErx=(p[5]||"").trim();row.drug=(p[6]||"").trim();row.rxNum=(p[7]||"").trim();row.notes=p.slice(8).join(",").trim();D.unshift(row);added++;}
  save();upHdr();
  document.getElementById("blkM").textContent="Added "+added+" entries"+(skipped?", skipped "+skipped+" invalid rows":"");
  document.getElementById("blkT").value="";
}

function saveEdit(){
  if(!editId)return;
  var src=document.getElementById("eSr").value,date=document.getElementById("eDt").value;
  var ds=document.getElementById("eDrug").value;
  var drug=ds==="__other__"?(prompt("Enter drug name:",""))||"":ds;
  var rphVerified=document.getElementById("eRphVerified").value||"";
  var showDWE2=(rphVerified==="Yes");
  var rphCount=showDWE2?(document.getElementById("eRphCount").value||""):"";
  var rphNames=showDWE2?getEditRphs():[];
  var gcVal=document.getElementById("eGC").value||"";
  var gcTeam=gcVal==="Yes"?(document.getElementById("eGCTeam").value||""):"";
  var gcWho=gcVal==="Yes"?(document.getElementById("eGCWho").value||""):"";
  for(var i=0;i<D.length;i++){
    if(D[i].id===editId){
      D[i].date=date;D[i].week=getWk(date);
      D[i].errorType=document.getElementById("eTy").value;
      D[i].source=src;
      D[i].team=src==="Human"?document.getElementById("eTm").value:"";
      D[i].who=src==="Human"?document.getElementById("eWh").value:"";
      D[i].faxErx=document.getElementById("eFx").value;
      D[i].drug=drug;
      D[i].rxNum=document.getElementById("eRx").value.trim();
      D[i].notes=document.getElementById("eNt").value;
      D[i].goodCatch=gcVal;
      D[i].gcTeam=gcTeam;
      D[i].gcWho=gcWho;
      D[i].dispensedWithError=rphVerified;
      D[i].rphCount=rphCount;
      D[i].rphNames=rphNames;
      D[i].rphVerified=rphVerified==="Yes"?"dispensed_with_error":(gcVal==="Yes"?"good_catch":"");
      break;
    }
  }
  save();closeEdit();rEntries();
}

function rEntries(){
  var sec=document.getElementById("sec-entries"),fil=[];

  var ftO='<option'+(eFT==="All"?" selected":"")+'>All</option>';for(var ei2=0;ei2<ET.length;ei2++)ftO+='<option'+(eFT===ET[ei2]?" selected":"")+'>'+ET[ei2]+'</option>';
  var fsO='<option'+(eFS==="All"?" selected":"")+'>All</option>';for(var si2=0;si2<SR.length;si2++)fsO+='<option'+(eFS===SR[si2]?" selected":"")+'>'+SR[si2]+'</option>';
