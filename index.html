<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Error Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f1f5f9;min-height:100vh;padding:16px}
.wrap{max-width:1200px;margin:0 auto}
.hdr{background:#1e40af;border-radius:12px;padding:16px 24px;margin-bottom:14px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:20px;font-weight:800;margin:0}
.hdr p{font-size:12px;opacity:.75;margin-top:2px}
.hdr-r{text-align:right;font-size:12px;color:#fff}
.big{font-size:22px;font-weight:800}
.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.nav button{padding:7px 13px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#475569}
.nav button.on{background:#4f46e5;color:#fff}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px}
.kpi-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.kpi{background:#fff;border-radius:10px;padding:11px 14px;border-left:4px solid #6366f1;min-width:120px;flex-grow:1}
.kpi .lb{font-size:10px;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.kpi .vl{font-size:20px;font-weight:800;color:#1e293b}
.kpi .sub{font-size:10px;color:#94a3b8;margin-top:1px}
.sec{display:none}.sec.on{display:block}
label.flb{display:block;font-size:11px;color:#64748b;font-weight:600;margin-bottom:3px;margin-top:10px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;color:#1e293b;background:#f8fafc;box-sizing:border-box}
textarea{resize:vertical}
.btn{padding:9px 16px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-full{width:100%;display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 10px;text-align:left;color:#fff;font-weight:600;font-size:11px;white-space:nowrap;background:#1e40af}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9}
tr.alt td{background:#f8fafc}
.bdg{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;display:inline-block;white-space:nowrap}
.tbl-wrap{overflow-x:auto}
.wk-btn{padding:5px 11px;border-radius:7px;border:1px solid #e2e8f0;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#374151;margin:2px}
.wk-btn.on{background:#1e40af;color:#fff}
.tfr td{background:#1e40af;color:#fff;font-weight:700;padding:8px 12px;text-align:center}
.tfr td:first-child{text-align:left}
.ii{width:46px;padding:3px 6px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;text-align:center;background:#fffbeb}
.fgrid{display:flex;gap:12px;flex-wrap:wrap}
.fhalf{width:47%;min-width:180px}
.fbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 14px}
.sbx{font-size:11px;background:#f1f5f9;border-radius:6px;padding:6px 10px;min-width:120px}
.ch-wrap{position:relative;width:100%}
.bar-wrap{height:7px;border-radius:4px;background:#e2e8f0;overflow:hidden;flex:1}
.bar-fill{height:7px;border-radius:4px}
.toggle-group{display:flex;gap:0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.tgl{padding:5px 14px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#475569}
.tgl.on{background:#4f46e5;color:#fff}
.alert-card{border-radius:10px;padding:12px 16px;margin-bottom:10px;border-left:4px solid #ef4444;background:#fff}
.alert-card.warn{border-left-color:#f59e0b}
.alert-card.good{border-left-color:#10b981}
.section-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.loading{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <h1>Pharmacy Error Tracker</h1>
      <p>Real-time intake error monitoring · Human · Bot · API</p>
    </div>
    <div class="hdr-r">
      <div class="big" id="hTot">...</div>
      <div id="hMode">This Week</div>
      <div style="color:#fca5a5" id="hPnd">Loading...</div>
    </div>
  </div>
  <div class="nav" id="navBar"></div>
  <div id="sec-dashboard" class="sec on"><div class="loading">Connecting to database...</div></div>
  <div id="sec-summary" class="sec"></div>
  <div id="sec-trends" class="sec"></div>
  <div id="sec-staff" class="sec"></div>
  <div id="sec-member" class="sec"></div>
  <div id="sec-log" class="sec"></div>
  <div id="sec-import" class="sec"></div>
  <div id="sec-entries" class="sec"></div>
  <div id="sec-admin" class="sec"></div>

  <!-- Edit Modal -->
  <div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;overflow-y:auto">
    <div style="background:#fff;border-radius:12px;padding:24px;max-width:560px;margin:40px auto;position:relative">
      <h3 style="font-size:16px;color:#1e293b;margin-bottom:16px">Edit Error Entry</h3>
      <div class="fgrid">
        <div class="fhalf"><label class="flb" style="margin-top:0">Date</label><input type="date" id="eDt"></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Error Type</label><select id="eTy"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Source</label><select id="eSr" onchange="upEF()"></select></div>
        <div class="fhalf" id="eTmW"><label class="flb" style="margin-top:0">Team</label><select id="eTm" onchange="upEW()"></select></div>
        <div class="fhalf" id="eWhW"><label class="flb" style="margin-top:0">Who</label><select id="eWh"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Fax/eRx</label><select id="eFx"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Drug Name</label><select id="eDrug"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">RX Number</label><input type="text" id="eRx" placeholder="e.g. 1234567"></div>
      </div>
      <label class="flb">Notes</label>
      <textarea id="eNt" rows="2"></textarea>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-full" onclick="saveEdit()">Save Changes</button>
        <button onclick="closeEdit()" style="padding:9px 16px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;flex:1">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Firebase ───────────────────────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyChlPFwzh-VBA5OcpM4umePMBMaP49u94g",
  authDomain: "intake-error-tracker.firebaseapp.com",
  databaseURL: "https://intake-error-tracker-default-rtdb.firebaseio.com",
  projectId: "intake-error-tracker",
  storageBucket: "intake-error-tracker.firebasestorage.app",
  messagingSenderId: "603495939691",
  appId: "1:603495939691:web:b1353cd898268dd328bb2e"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var errRef = db.ref("errors");
var fbiRef = db.ref("fbi");

// ── Constants ──────────────────────────────────────────────────────────────
var ET=["Incorrect Refills","Invalid Rx","Drug Mismatch","Wrong DAW","Wrong Prescriber","Wrong Quantity","Wrong Quick Sig","Entered Under Wrong PT","Self Prescribed","Wrong Written Date","Wrong Patient"];
var TM=["Intake","PCR 3","TLAC","Ups","RPH"];
var SR=["Human","Bot","API"];
var TC=["#6366f1","#f59e0b","#10b981","#ef4444","#3b82f6","#ec4899","#8b5cf6","#14b8a6","#f97316","#64748b","#a855f7"];
var TLC={};
TLC["Intake"]="#6366f1";TLC["PCR 3"]="#f59e0b";TLC["TLAC"]="#10b981";TLC["Ups"]="#ef4444";TLC["RPH"]="#3b82f6";TLC["Bot"]="#8b5cf6";TLC["API"]="#ec4899";
var SM={};
SM["Intake"]=[];SM["PCR 3"]=[];SM["TLAC"]=[];SM["Ups"]=[];SM["RPH"]=[];
var FX=["New Erx","Refill Response","Fax","Verbal","Transfer"];

// ── Editable lists (stored in Firebase) ───────────────────────────────────
var DRUGS = ["Metformin 500mg","Metformin 1000mg","Lisinopril 10mg","Ozempic 0.5mg","Ozempic 1mg","Ozempic 2mg","Mounjaro 5mg","Mounjaro 10mg","Wegovy 1.7mg","Wegovy 2.4mg","Tirzepatide 7.5mg","Semaglutide 7.5mg","Humira 40mg","Lantus 100u","Jardiance 10mg"];
var drugsRef = db.ref("config/drugs");
var etRef = db.ref("config/errorTypes");
var tmRef = db.ref("config/teams");

drugsRef.on("value",function(snap){var v=snap.val();if(v&&Array.isArray(v))DRUGS=v;});
etRef.on("value",function(snap){var v=snap.val();if(v&&Array.isArray(v)){ET=v;}});
tmRef.on("value",function(snap){var v=snap.val();if(v&&Array.isArray(v)){TM=v;}});
staffRef.on("value",function(snap){
  var v=snap.val();
  if(v){
    for(var t in v){
      if(Array.isArray(v[t])) SM[t]=v[t];
    }
  }
  render(curV);
});

function saveDrugs(){drugsRef.set(DRUGS);}
function saveET(){etRef.set(ET);}
function saveTM(){tmRef.set(TM);}
function saveStaff(){staffRef.set(SM);}

// edit modal state
var editId=null;
var D=[], FBI={};
var idS=Date.now();
function mkId(){return idS++;}
var today=new Date();
var todayStr=fmtD(today);
var thisWk=getWk(todayStr);
var curV="dashboard", dashMode="weekly", selWk=null, trendM="weekly";
var mvTm="All",mvWho="",mvTy="All",mvWk="All";
var eFF="All",eFT="All",eFS="All",eFSt="All";
var charts={};

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtD(d){var m=d.getMonth()+1,dy=d.getDate();return d.getFullYear()+"-"+(m<10?"0"+m:m)+"-"+(dy<10?"0"+dy:dy);}
function pDate(s){var p=s.split("/");if(p.length!==3)return s;var y=p[2];if(y.length>4)y=y.slice(0,4);var mo=p[0].length===1?"0"+p[0]:p[0],dy=p[1].length===1?"0"+p[1]:p[1];var dt=new Date(y+"-"+mo+"-"+dy);return isNaN(dt)?s:fmtD(dt);}
function getWk(ds){try{var d=new Date(ds),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}catch(e){return 1;}}
function tyC(t){var i=ET.indexOf(t);return i>=0?TC[i]:"#6366f1";}
function bdg(txt,col){return '<span class="bdg" style="background:'+col+'33;color:'+col+'">'+txt+'</span>';}
function allWks(){var w={};for(var i=0;i<D.length;i++)w[D[i].week]=1;return Object.keys(w).map(Number).sort(function(a,b){return a-b;});}
function tmOpts(sel){var h="";for(var i=0;i<TM.length;i++)h+='<option'+(TM[i]===sel?" selected":"")+'>'+TM[i]+'</option>';return h;}
function etOpts(sel){var h="";for(var i=0;i<ET.length;i++)h+='<option'+(ET[i]===sel?" selected":"")+'>'+ET[i]+'</option>';return h;}
function srOpts(sel){var h="";for(var i=0;i<SR.length;i++)h+='<option'+(SR[i]===sel?" selected":"")+'>'+SR[i]+'</option>';return h;}
function fxOpts(sel){var h="";for(var i=0;i<FX.length;i++)h+='<option'+(FX[i]===sel?" selected":"")+'>'+FX[i]+'</option>';return h;}
function whoOpts(team,sel){var h='<option value="">Select</option>';var n=SM[team]||[];for(var i=0;i<n.length;i++)h+='<option'+(n[i]===sel?" selected":"")+'>'+n[i]+'</option>';return h;}
function dChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function getSubset(){
  if(dashMode==="daily")return D.filter(function(e){return e.date===todayStr;});
  if(dashMode==="weekly")return D.filter(function(e){return e.week===thisWk;});
  return D;
}

// ── Firebase listeners ─────────────────────────────────────────────────────
errRef.on("value",function(snap){
  var val=snap.val();
  D=[];
  if(val){for(var k in val)D.push(val[k]);}
  D.sort(function(a,b){return b.date.localeCompare(a.date);});
  upHdr();render(curV);
});
fbiRef.on("value",function(snap){
  FBI=snap.val()||{};
  upHdr();render(curV);
});

function saveErr(row){errRef.child(String(row.id)).set(row);}
function delErr(id){errRef.child(String(id)).remove();fbiRef.child(String(id)).remove();}
function saveInit(id,init,date){fbiRef.child(String(id)).set({initials:init,date:date});}
function clearInit(id){fbiRef.child(String(id)).remove();}

// ── Nav ────────────────────────────────────────────────────────────────────
var NAVS=[
  {k:"dashboard",l:"Dashboard"},{k:"summary",l:"Summary"},
  {k:"trends",l:"Trends"},{k:"staff",l:"Staff"},
  {k:"member",l:"Member View"},{k:"log",l:"Log Error"},
  {k:"import",l:"Import"},{k:"entries",l:"All Entries"},
  {k:"admin",l:"Admin"}
];
function buildNav(){
  var h="";for(var i=0;i<NAVS.length;i++)h+='<button class="'+(NAVS[i].k===curV?"on":"")+'" onclick="goTo(\''+NAVS[i].k+'\')">'+NAVS[i].l+'</button>';
  document.getElementById("navBar").innerHTML=h;
}
function goTo(v){curV=v;var ss=document.querySelectorAll(".sec");for(var i=0;i<ss.length;i++)ss[i].classList.remove("on");document.getElementById("sec-"+v).classList.add("on");buildNav();render(v);}
function render(v){var fn={dashboard:rDash,summary:rSum,trends:rTrend,staff:rStaff,member:rMember,log:rLog,import:rImport,entries:rEntries,admin:rAdmin};if(fn[v])fn[v]();}
function upHdr(){
  var sub=getSubset();
  document.getElementById("hTot").textContent=sub.length;
  document.getElementById("hPnd").textContent=(D.length-Object.keys(FBI).length)+" Pending Feedback";
  document.getElementById("hMode").textContent=dashMode==="daily"?"Today":dashMode==="weekly"?"This Week":"All Time";
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function rDash(){
  var sec=document.getElementById("sec-dashboard");
  var sub=getSubset();
  var human=sub.filter(function(e){return e.source==="Human";}).length;
  var bot=sub.filter(function(e){return e.source==="Bot";}).length;
  var api=sub.filter(function(e){return e.source==="API";}).length;
  var etCnts={};for(var i=0;i<sub.length;i++){var et=sub[i].errorType;etCnts[et]=(etCnts[et]||0)+1;}
  var topET="None",topEV=0;for(var k in etCnts){if(etCnts[k]>topEV){topEV=etCnts[k];topET=k;}}
  var tmCnts={};for(var i2=0;i2<sub.length;i2++){if(sub[i2].source==="Human"&&sub[i2].team){tmCnts[sub[i2].team]=(tmCnts[sub[i2].team]||0)+1;}}
  var topTM="None",topTV=0;for(var k2 in tmCnts){if(tmCnts[k2]>topTV){topTV=tmCnts[k2];topTM=k2;}}
  var stCnts={};for(var i3=0;i3<sub.length;i3++){if(sub[i3].who){stCnts[sub[i3].who]=(stCnts[sub[i3].who]||0)+1;}}
  var topST="None",topSV=0;for(var k3 in stCnts){if(stCnts[k3]>topSV){topSV=stCnts[k3];topST=k3;}}
  var prevSub=dashMode==="daily"?D.filter(function(e){var yd=new Date(today);yd.setDate(today.getDate()-1);return e.date===fmtD(yd);}):dashMode==="weekly"?D.filter(function(e){return e.week===thisWk-1;}):[];
  var delta=sub.length-prevSub.length;
  var deltaStr=delta===0?"Same as last "+(dashMode==="daily"?"day":"week"):delta>0?"+"+delta+" vs last "+(dashMode==="daily"?"day":"week"):delta+" vs last "+(dashMode==="daily"?"day":"week");
  var deltaColor=delta>0?"#ef4444":delta<0?"#10b981":"#94a3b8";
  var alerts="";
  if(topST!=="None"&&topSV>=3)alerts+='<div class="alert-card"><div style="font-size:11px;font-weight:700;color:#ef4444">HIGH ERROR ALERT</div><div style="font-size:13px;color:#1e293b;margin-top:2px"><strong>'+topST+'</strong> has <strong>'+topSV+'</strong> errors this '+(dashMode==="daily"?"day":"week")+' — needs attention</div></div>';
  if(topTM!=="None"&&topTV>=5)alerts+='<div class="alert-card warn"><div style="font-size:11px;font-weight:700;color:#f59e0b">TEAM ALERT</div><div style="font-size:13px;color:#1e293b;margin-top:2px"><strong>'+topTM+'</strong> team leading with <strong>'+topTV+'</strong> errors this '+(dashMode==="daily"?"day":"week")+'</div></div>';
  if(!alerts)alerts='<div class="alert-card good"><div style="font-size:11px;font-weight:700;color:#10b981">ALL CLEAR</div><div style="font-size:13px;color:#1e293b;margin-top:2px">No critical thresholds exceeded.</div></div>';
  var kpis=[
    {l:"Total Errors",v:sub.length,c:"#6366f1",sub:deltaStr,subC:deltaColor},
    {l:"Human",v:human,c:"#3b82f6",sub:Math.round(sub.length?human/sub.length*100:0)+"% of total",subC:"#94a3b8"},
    {l:"Bot",v:bot,c:"#8b5cf6",sub:Math.round(sub.length?bot/sub.length*100:0)+"% of total",subC:"#94a3b8"},
    {l:"API",v:api,c:"#ec4899",sub:Math.round(sub.length?api/sub.length*100:0)+"% of total",subC:"#94a3b8"},
    {l:"Top Error",v:topEV>0?topET:"None",c:"#ef4444",sub:topEV>0?topEV+" occurrences":"",subC:"#94a3b8",sm:true},
    {l:"Top Team",v:topTM,c:TLC[topTM]||"#64748b",sub:topTV>0?topTV+" errors":"",subC:"#94a3b8",sm:true},
    {l:"Top Staff",v:topST,c:"#f97316",sub:topSV>0?topSV+" errors":"",subC:"#94a3b8",sm:true}
  ];
  var kh="";for(var ki=0;ki<kpis.length;ki++)kh+='<div class="kpi" style="border-left-color:'+kpis[ki].c+'"><div class="lb">'+kpis[ki].l+'</div><div class="vl" style="font-size:'+(kpis[ki].sm?13:20)+'px;line-height:1.2">'+kpis[ki].v+'</div>'+(kpis[ki].sub?'<div class="sub" style="color:'+kpis[ki].subC+'">'+kpis[ki].sub+'</div>':'')+'</div>';
  var tD=[];for(var j=0;j<ET.length;j++)tD.push(sub.filter(function(e){return e.errorType===ET[j];}).length);
  var allSrc=TM.concat(["Bot","API"]),pD=[],pC=[],pL=[];
  for(var k4=0;k4<allSrc.length;k4++){var cnt=allSrc[k4]==="Bot"?bot:allSrc[k4]==="API"?api:sub.filter(function(e){return e.source==="Human"&&e.team===allSrc[k4];}).length;if(cnt>0){pL.push(allSrc[k4]);pC.push(TLC[allSrc[k4]]||"#ccc");pD.push(cnt);}}
  var days=["Mon","Tue","Wed","Thu","Fri"],dayData=[];
  var wkStart=new Date(today),dow=wkStart.getDay(),diff=dow===0?6:dow-1;wkStart.setDate(wkStart.getDate()-diff);
  for(var d=0;d<5;d++){var dd=new Date(wkStart);dd.setDate(wkStart.getDate()+d);dayData.push(D.filter(function(e){return e.date===fmtD(dd);}).length);}
  var tog='<div class="toggle-group"><button class="tgl'+(dashMode==="daily"?" on":"")+'" onclick="dashMode=\'daily\';upHdr();rDash()">Today</button><button class="tgl'+(dashMode==="weekly"?" on":"")+'" onclick="dashMode=\'weekly\';upHdr();rDash()">This Week</button><button class="tgl'+(dashMode==="cumulative"?" on":"")+'" onclick="dashMode=\'cumulative\';upHdr();rDash()">All Time</button></div>';
  var period=dashMode==="daily"?"Today":dashMode==="weekly"?"This Week":"All Time";
  sec.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><h2 style="font-size:15px;font-weight:700;color:#1e293b">Overview</h2>'+tog+'</div><div class="kpi-row">'+kh+'</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px"><div class="card" style="flex:1;min-width:300px;margin-bottom:0"><div class="section-title">Errors by Type <span style="font-size:10px;color:#94a3b8;font-weight:400">'+period+'</span></div><div class="ch-wrap" style="height:240px"><canvas id="ch-ty"></canvas></div></div><div class="card" style="flex:1;min-width:260px;margin-bottom:0"><div class="section-title">By Team/Source <span style="font-size:10px;color:#94a3b8;font-weight:400">'+period+'</span></div><div class="ch-wrap" style="height:240px"><canvas id="ch-tm"></canvas></div></div><div class="card" style="flex:1;min-width:260px;margin-bottom:0"><div class="section-title">Daily Errors This Week</div><div class="ch-wrap" style="height:240px"><canvas id="ch-day"></canvas></div></div></div><div><div class="section-title">Alerts &amp; Insights</div>'+alerts+'</div>';
  dChart("ch-ty");
  charts["ch-ty"]=new Chart(document.getElementById("ch-ty"),{type:"bar",data:{labels:ET.map(function(t){return t.length>16?t.slice(0,14)+"...":t;}),datasets:[{data:tD,backgroundColor:TC,borderRadius:4}]},options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:9}}}},responsive:true,maintainAspectRatio:false}});

    '<label class="flb">Or Paste Rows</label>'+
    '<textarea id="blkT" rows="8" placeholder="Paste CSV rows here..." style="font-family:monospace;font-size:11px" oninput="upBC()"></textarea>'+
    '<div id="blkC" style="font-size:11px;color:#6366f1;margin:6px 0"></div>'+
    '<div id="blkM" style="font-size:12px;color:#10b981;font-weight:600;margin-bottom:8px"></div>'+
    '<button class="btn btn-full" onclick="impBulk()">Import Rows</button></div>';
}
function loadCSVFile(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){document.getElementById("blkT").value=e.target.result;upBC();};r.readAsText(f);}
function upBC(){var t=document.getElementById("blkT").value.trim();var n=t?t.split("\n").filter(function(l){return l.trim();}).length:0;document.getElementById("blkC").textContent=n?n+" rows ready":"";}
function impBulk(){
  var lines=document.getElementById("blkT").value.trim().split("\n"),added=0,skipped=0;
  for(var i=0;i<lines.length;i++){
    var p=lines[i].split(",");if(p.length<3){skipped++;continue;}
    var date=p[0].trim(),et=p[1].trim(),src=p[2].trim();if(!date||!et||!src){skipped++;continue;}
    var row={};row.id=mkId();row.date=date;row.week=getWk(date);row.errorType=et;
    row.source=SR.indexOf(src)>=0?src:"Human";row.team=TM.indexOf((p[3]||"").trim())>=0?(p[3]||"").trim():"";
    row.who=(p[4]||"").trim();row.faxErx=(p[5]||"").trim();row.drug=(p[6]||"").trim();row.rxNum=(p[7]||"").trim();row.notes=p.slice(8).join(",").trim();
    saveErr(row);added++;
  }
  document.getElementById("blkM").textContent="Added "+added+" entries"+(skipped?", skipped "+skipped+" invalid rows":"");
  document.getElementById("blkT").value="";document.getElementById("blkC").textContent="";
}

// ── Edit Modal ─────────────────────────────────────────────────────────────
function openEdit(id){
  var e=null;for(var i=0;i<D.length;i++)if(D[i].id===id){e=D[i];break;}
  if(!e)return;
  editId=id;
  document.getElementById("eDt").value=e.date||"";
  document.getElementById("eTy").innerHTML=etOpts(e.errorType||"");
  document.getElementById("eSr").innerHTML=srOpts(e.source||"Human");
  document.getElementById("eTm").innerHTML=tmOpts(e.team||"Intake");
  document.getElementById("eWh").innerHTML=whoOpts(e.team||"Intake",e.who||"");
  document.getElementById("eFx").innerHTML=fxOpts(e.faxErx||"");
  document.getElementById("eDrug").innerHTML=drugOpts(e.drug||"");
  document.getElementById("eRx").value=e.rxNum||"";
  document.getElementById("eNt").value=e.notes||"";
  var show=(e.source||"Human")==="Human";
  document.getElementById("eTmW").style.display=show?"block":"none";
  document.getElementById("eWhW").style.display=show?"block":"none";
  document.getElementById("editModal").style.display="block";
}
function closeEdit(){document.getElementById("editModal").style.display="none";editId=null;}
function upEF(){var s=document.getElementById("eSr").value,show=s==="Human";document.getElementById("eTmW").style.display=show?"block":"none";document.getElementById("eWhW").style.display=show?"block":"none";}
function upEW(){var t=document.getElementById("eTm").value;document.getElementById("eWh").innerHTML=whoOpts(t,"");}
function saveEdit(){
  if(!editId)return;
  var src=document.getElementById("eSr").value;
  var date=document.getElementById("eDt").value;
  var drugSel=document.getElementById("eDrug").value;
  var drug=drugSel==="__other__"?(prompt("Enter drug name:",""))||"":drugSel;
  var updates={};
  updates.date=date;updates.week=getWk(date);
  updates.errorType=document.getElementById("eTy").value;
  updates.source=src;
  updates.team=src==="Human"?document.getElementById("eTm").value:"";
  updates.who=src==="Human"?document.getElementById("eWh").value:"";
  updates.faxErx=document.getElementById("eFx").value;
  updates.drug=drug;
  updates.rxNum=document.getElementById("eRx").value.trim();
  updates.notes=document.getElementById("eNt").value;
  errRef.child(String(editId)).update(updates);
  closeEdit();
}

// ── Admin Tab ──────────────────────────────────────────────────────────────
function rAdmin(){
  var sec=document.getElementById("sec-admin");
  var etList=ET.map(function(t,i){return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9"><span style="flex:1;font-size:13px">'+t+'</span><button onclick="removeET('+i+')" style="padding:2px 8px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;border-radius:5px;font-size:11px;cursor:pointer">Remove</button></div>';}).join("");
  var tmList=TM.map(function(t,i){return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9"><span style="flex:1;font-size:13px">'+bdg(t,TLC[t]||"#6366f1")+'</span><button onclick="removeTM('+i+')" style="padding:2px 8px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;border-radius:5px;font-size:11px;cursor:pointer">Remove</button></div>';}).join("");
  var drugList=DRUGS.map(function(d,i){return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9"><span style="flex:1;font-size:13px">'+d+'</span><button onclick="removeDrug('+i+')" style="padding:2px 8px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;border-radius:5px;font-size:11px;cursor:pointer">Remove</button></div>';}).join("");

  sec.innerHTML=
    '<div style="display:flex;gap:12px;flex-wrap:wrap">'+

    // Error Types
    '<div class="card" style="flex:1;min-width:280px">'+
      '<h3 style="font-size:14px;color:#1e293b;margin-bottom:4px">Error Types</h3>'+
      '<p style="font-size:11px;color:#94a3b8;margin-bottom:12px">These appear in the Log Error dropdown</p>'+
      '<div style="display:flex;gap:8px;margin-bottom:12px">'+
        '<input id="newET" placeholder="New error type" style="flex:1">'+
        '<button onclick="addET()" class="btn" style="margin-top:0;padding:7px 14px">Add</button>'+
      '</div>'+
      '<div style="max-height:320px;overflow-y:auto">'+etList+'</div>'+
    '</div>'+

    // Teams
    '<div class="card" style="flex:1;min-width:280px">'+
      '<h3 style="font-size:14px;color:#1e293b;margin-bottom:4px">Teams</h3>'+
      '<p style="font-size:11px;color:#94a3b8;margin-bottom:12px">Teams available when logging errors</p>'+
      '<div style="display:flex;gap:8px;margin-bottom:12px">'+
        '<input id="newTM" placeholder="New team name" style="flex:1">'+
        '<button onclick="addTM()" class="btn" style="margin-top:0;padding:7px 14px">Add</button>'+
      '</div>'+
      '<div style="max-height:320px;overflow-y:auto">'+tmList+'</div>'+
    '</div>'+

    // Drugs
    '<div class="card" style="flex:1;min-width:280px">'+
      '<h3 style="font-size:14px;color:#1e293b;margin-bottom:4px">Drug List</h3>'+
      '<p style="font-size:11px;color:#94a3b8;margin-bottom:12px">Drugs available in the Log Error dropdown</p>'+
      '<div style="display:flex;gap:8px;margin-bottom:12px">'+
        '<input id="newDrug" placeholder="e.g. Metformin 500mg" style="flex:1">'+
        '<button onclick="addDrug()" class="btn" style="margin-top:0;padding:7px 14px">Add</button>'+
      '</div>'+
      '<div style="max-height:320px;overflow-y:auto">'+drugList+'</div>'+
    '</div>'+
    '</div>';
}

function addET(){var v=document.getElementById("newET").value.trim();if(!v)return;ET.push(v);saveET();document.getElementById("newET").value="";rAdmin();}
function removeET(i){if(!confirm("Remove this error type?"))return;ET.splice(i,1);saveET();rAdmin();}
function addTM(){var v=document.getElementById("newTM").value.trim();if(!v)return;TM.push(v);if(!TLC[v])TLC[v]="#6366f1";saveTM();document.getElementById("newTM").value="";rAdmin();}
function removeTM(i){if(!confirm("Remove this team?"))return;TM.splice(i,1);saveTM();rAdmin();}
function addDrug(){var v=document.getElementById("newDrug").value.trim();if(!v)return;DRUGS.push(v);saveDrugs();document.getElementById("newDrug").value="";rAdmin();}
function removeDrug(i){if(!confirm("Remove this drug?"))return;DRUGS.splice(i,1);saveDrugs();rAdmin();}

// ── All Entries ────────────────────────────────────────────────────────────
function rEntries(){
  var sec=document.getElementById("sec-entries"),fil=[];
  for(var i=0;i<D.length;i++){var e=D[i];if((eFF==="All"||e.team===eFF||(eFF==="Bot"&&e.source==="Bot")||(eFF==="API"&&e.source==="API"))&&(eFT==="All"||e.errorType===eFT)&&(eFS==="All"||e.source===eFS)&&(eFSt==="All"||(eFSt==="Feedback Given"&&!!FBI[e.id])||(eFSt==="Pending"&&!FBI[e.id])))fil.push(e);}
  var ffO='<option'+(eFF==="All"?" selected":"")+'>All</option>';for(var ti=0;ti<TM.length;ti++)ffO+='<option'+(eFF===TM[ti]?" selected":"")+'>'+TM[ti]+'</option>';ffO+='<option'+(eFF==="Bot"?" selected":"")+'>Bot</option><option'+(eFF==="API"?" selected":"")+'>API</option>';
  var ftO='<option'+(eFT==="All"?" selected":"")+'>All</option>';for(var ei2=0;ei2<ET.length;ei2++)ftO+='<option'+(eFT===ET[ei2]?" selected":"")+'>'+ET[ei2]+'</option>';
  var fsO='<option'+(eFS==="All"?" selected":"")+'>All</option>';for(var si2=0;si2<SR.length;si2++)fsO+='<option'+(eFS===SR[si2]?" selected":"")+'>'+SR[si2]+'</option>';
  var rows="",shown=fil.length>300?fil.slice(0,300):fil;
  for(var ri=0;ri<shown.length;ri++){
    var e2=shown[ri],tc=tyC(e2.errorType),hi=FBI[e2.id],bg=hi?"#f0fdf4":(ri%2===0?"#f8fafc":"#fff");
    rows+='<tr style="background:'+bg+'"><td style="white-space:nowrap">'+e2.date+'</td><td style="color:#94a3b8">'+e2.week+'</td><td>'+bdg(e2.errorType,tc)+'</td><td>'+bdg(e2.source,TLC[e2.source]||"#6366f1")+'</td><td>'+(e2.team?bdg(e2.team,TLC[e2.team]||"#6366f1"):"")+'</td><td>'+(e2.who||"—")+'</td><td style="color:#64748b">'+(e2.faxErx||"—")+'</td><td style="color:#374151">'+(e2.drug||"—")+'</td><td style="color:#374151">'+(e2.rxNum||"—")+'</td><td style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#94a3b8">'+(e2.notes||"—")+'</td>'+
    '<td>'+(hi?'<span class="bdg" style="background:#dcfce7;color:#16a34a;letter-spacing:1px">'+hi.initials+'</span>':'<input class="ii" maxlength="4" placeholder="Init." onblur="setIE('+e2.id+',this.value)">')+'</td>'+
    '<td style="font-size:11px;color:#64748b;white-space:nowrap">'+(hi?hi.date:"—")+'</td>'+
    '<td style="white-space:nowrap">'+
      '<button onclick="openEdit('+e2.id+')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #c7d2fe;background:#eef2ff;color:#4f46e5;cursor:pointer;margin-right:3px">Edit</button>'+
      (hi?'<button onclick="clrI('+e2.id+')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;margin-right:3px">Clear</button>':"")+
      '<button onclick="delE('+e2.id+')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;cursor:pointer;opacity:.5">Del</button>'+
    '</td></tr>';
  }
  sec.innerHTML='<div class="card fbar" style="margin-bottom:10px">'+
    '<label style="font-size:11px;color:#64748b">Team:</label><select onchange="eFF=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px">'+ffO+'</select>'+
    '<label style="font-size:11px;color:#64748b">Type:</label><select onchange="eFT=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px">'+ftO+'</select>'+
    '<label style="font-size:11px;color:#64748b">Source:</label><select onchange="eFS=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px">'+fsO+'</select>'+
    '<label style="font-size:11px;color:#64748b">Status:</label><select onchange="eFSt=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px"><option'+(eFSt==="All"?" selected":"")+'>All</option><option'+(eFSt==="Feedback Given"?" selected":"")+'>Feedback Given</option><option'+(eFSt==="Pending"?" selected":"")+'>Pending</option></select>'+
    '<span style="font-size:11px;color:#94a3b8;margin-left:auto">'+fil.length+' entries</span></div>'+
    '<div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table><thead><tr>'+
    '<th>Date</th><th>Week</th><th>Error Type</th><th>Source</th><th>Team</th><th>Who</th><th>Fax/eRx</th><th>Drug</th><th>RX</th><th>Notes</th><th>Lead Initials</th><th>FB Date</th><th></th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function setIE(id,val){var v=val.trim().toUpperCase();if(v)saveInit(id,v,fmtD(new Date()));}
function clrI(id){clearInit(id);}
function delE(id){if(!confirm("Delete this entry?"))return;delErr(id);}

// ── Init ───────────────────────────────────────────────────────────────────
buildNav();
</script>
