<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Error Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f1f5f9;min-height:100vh;padding:16px}
.wrap{max-width:1200px;margin:0 auto}
.hdr{background:#1e40af;border-radius:12px;padding:16px 24px;margin-bottom:14px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:20px;font-weight:800;margin:0}
.hdr p{font-size:12px;opacity:.75;margin-top:2px}
.hdr-r{text-align:right;font-size:12px;color:#fff}
.big{font-size:22px;font-weight:800}
.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.nav button{padding:7px 13px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#475569}
.nav button.on{background:#4f46e5;color:#fff}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px}
.kpi-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.kpi{background:#fff;border-radius:10px;padding:11px 14px;border-left:4px solid #6366f1;min-width:120px;flex-grow:1}
.kpi .lb{font-size:10px;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.kpi .vl{font-size:20px;font-weight:800;color:#1e293b}
.kpi .sub{font-size:10px;color:#94a3b8;margin-top:1px}
.sec{display:none}.sec.on{display:block}
label.flb{display:block;font-size:11px;color:#64748b;font-weight:600;margin-bottom:3px;margin-top:10px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;color:#1e293b;background:#f8fafc;box-sizing:border-box}
textarea{resize:vertical}
.btn{padding:9px 16px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-full{width:100%;display:block}
.btn-green{background:#10b981}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 10px;text-align:left;color:#fff;font-weight:600;font-size:11px;white-space:nowrap;background:#1e40af}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9}
tr.alt td{background:#f8fafc}
.bdg{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;display:inline-block;white-space:nowrap}
.tbl-wrap{overflow-x:auto}
.wk-btn{padding:5px 11px;border-radius:7px;border:1px solid #e2e8f0;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#374151;margin:2px}
.wk-btn.on{background:#1e40af;color:#fff}
.tfr td{background:#1e40af;color:#fff;font-weight:700;padding:8px 12px;text-align:center}
.tfr td:first-child{text-align:left}
.ii{width:46px;padding:3px 6px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;text-align:center;background:#fffbeb}
.fgrid{display:flex;gap:12px;flex-wrap:wrap}
.fhalf{width:47%;min-width:180px}
.fbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 14px}
.sbx{font-size:11px;background:#f1f5f9;border-radius:6px;padding:6px 10px;min-width:120px}
.ch-wrap{position:relative;width:100%}
.toggle-group{display:flex;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.tgl{padding:5px 14px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#475569}
.tgl.on{background:#4f46e5;color:#fff}
.alert-card{border-radius:10px;padding:12px 16px;margin-bottom:10px;border-left:4px solid #ef4444;background:#fff}
.alert-card.warn{border-left-color:#f59e0b}
.alert-card.good{border-left-color:#10b981}
.section-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;overflow-y:auto}
.modal-box{background:#fff;border-radius:12px;padding:24px;max-width:560px;margin:40px auto}
.admin-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9}
/* Sync bar */
.sync-bar{border-radius:8px;padding:10px 16px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;transition:background .4s}
.sync-bar.synced{background:#1e40af;color:#fff}
.sync-bar.saving{background:#f59e0b;color:#fff}
.sync-bar.error{background:#ef4444;color:#fff}
.sync-bar.loading{background:#6366f1;color:#fff}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.sync-dot.green{background:#4ade80}
.sync-dot.yellow{background:#fef08a;animation:pulse .8s infinite}
.sync-dot.red{background:#fca5a5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-actions{display:flex;gap:8px;align-items:center}
.sync-btn{padding:4px 12px;border:1px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.sync-btn:hover{background:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1>Pharmacy Error Tracker</h1><p>Real-time intake error monitoring · Human · Bot · API</p></div>
    <div class="hdr-r"><div class="big" id="hTot">0</div><div id="hMode">This Week</div><div style="color:#fca5a5" id="hPnd">0 Pending</div></div>
  </div>

  <div id="syncBar" class="sync-bar loading">
    <span><span class="sync-dot yellow" id="syncDot"></span><span id="syncMsg">Connecting to cloud storage…</span></span>
    <div class="sync-actions">
      <button class="sync-btn" onclick="forceSave()">💾 Save Now</button>
      <button class="sync-btn" onclick="exportData()">⬇ Export Backup</button>
    </div>
  </div>

  <div class="nav" id="navBar"></div>
  <div id="sec-dashboard" class="sec on"></div>
  <div id="sec-summary" class="sec"></div>
  <div id="sec-trends" class="sec"></div>
  <div id="sec-staff" class="sec"></div>
  <div id="sec-member" class="sec"></div>
  <div id="sec-log" class="sec"></div>
  <div id="sec-import" class="sec"></div>
  <div id="sec-entries" class="sec"></div>
  <div id="sec-admin" class="sec"></div>

  <div id="editModal" class="modal-bg">
    <div class="modal-box">
      <h3 style="font-size:16px;color:#1e293b;margin-bottom:16px">Edit Error Entry</h3>
      <div class="fgrid">
        <div class="fhalf"><label class="flb" style="margin-top:0">Date</label><input type="date" id="eDt"></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Error Type</label><select id="eTy"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Source</label><select id="eSr" onchange="upEF()"></select></div>
        <div class="fhalf" id="eTmW"><label class="flb" style="margin-top:0">Team</label><select id="eTm" onchange="upEW()"></select></div>
        <div class="fhalf" id="eWhW"><label class="flb" style="margin-top:0">Who</label><select id="eWh"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Fax/eRx</label><select id="eFx"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">Drug</label><select id="eDrug"></select></div>
        <div class="fhalf"><label class="flb" style="margin-top:0">RX Number</label><input type="text" id="eRx"></div>
      </div>
      <label class="flb">Notes</label><textarea id="eNt" rows="2"></textarea>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-full" onclick="saveEdit()">Save Changes</button>
        <button onclick="closeEdit()" style="padding:9px 16px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;flex:1;margin-top:10px">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
var ET=["Incorrect Refills","Invalid Rx","Drug Mismatch","Wrong DAW","Wrong Prescriber","Wrong Quantity","Wrong Quick Sig","Entered Under Wrong PT","Self Prescribed","Wrong Written Date","Wrong Patient"];
var TM=["Intake","PCR 3","TLAC","Ups","RPH"];
var SR=["Human","Bot","API"];
var TC=["#6366f1","#f59e0b","#10b981","#ef4444","#3b82f6","#ec4899","#8b5cf6","#14b8a6","#f97316","#64748b","#a855f7"];
var TLC={Intake:"#6366f1","PCR 3":"#f59e0b",TLAC:"#10b981",Ups:"#ef4444",RPH:"#3b82f6",Bot:"#8b5cf6",API:"#ec4899"};
var SM={Intake:[],  "PCR 3":[], TLAC:[], Ups:[], RPH:[]};
var FX=["New Erx","Refill Response","Fax","Verbal","Transfer"];
var DRUGS=["Metformin 500mg","Metformin 1000mg","Lisinopril 10mg","Ozempic 0.5mg","Ozempic 1mg","Ozempic 2mg","Mounjaro 5mg","Mounjaro 10mg","Wegovy 1.7mg","Semaglutide 7.5mg","Humira 40mg","Lantus 100u","Jardiance 10mg","Tirzepatide 7.5mg"];
var idS=Date.now();
function mkId(){return idS++;}
function fmtD(d){var m=d.getMonth()+1,dy=d.getDate();return d.getFullYear()+"-"+(m<10?"0"+m:m)+"-"+(dy<10?"0"+dy:dy);}
function getWk(ds){try{var d=new Date(ds),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}catch(e){return 1;}}
function tyC(t){var i=ET.indexOf(t);return i>=0?TC[i]:"#6366f1";}
function bdg(txt,col){return'<span class="bdg" style="background:'+col+'33;color:'+col+'">'+txt+'</span>';}
function allWks(){var w={};for(var i=0;i<D.length;i++)w[D[i].week]=1;return Object.keys(w).map(Number).sort(function(a,b){return a-b;});}
function tmOpts(sel){var h="";for(var i=0;i<TM.length;i++)h+='<option'+(TM[i]===sel?" selected":"")+'>'+TM[i]+'</option>';return h;}
function etOpts(sel){var h="";for(var i=0;i<ET.length;i++)h+='<option'+(ET[i]===sel?" selected":"")+'>'+ET[i]+'</option>';return h;}
function srOpts(sel){var h="";for(var i=0;i<SR.length;i++)h+='<option'+(SR[i]===sel?" selected":"")+'>'+SR[i]+'</option>';return h;}
function fxOpts(sel){var h="";for(var i=0;i<FX.length;i++)h+='<option'+(FX[i]===sel?" selected":"")+'>'+FX[i]+'</option>';return h;}
function whoOpts(team,sel){var h='<option value="">Select</option>';var n=SM[team]||[];for(var i=0;i<n.length;i++)h+='<option'+(n[i]===sel?" selected":"")+'>'+n[i]+'</option>';return h;}
function drugOpts(sel){var h='<option value="">-- Select Drug --</option>';for(var i=0;i<DRUGS.length;i++)h+='<option'+(DRUGS[i]===sel?" selected":"")+'>'+DRUGS[i]+'</option>';h+='<option value="__other__">Other (type below)</option>';return h;}
function dChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function getSubset(){if(dashMode==="daily")return D.filter(function(e){return e.date===todayStr;});if(dashMode==="weekly")return D.filter(function(e){return e.week===thisWk;});return D;}

var D=[],FBI={};
var curV="dashboard",dashMode="weekly",selWk=null,trendM="weekly";
var mvTm="All",mvWho="",mvTy="All",mvWk="All";
var eFF="All",eFT="All",eFS="All",eFSt="All";
var charts={},editId=null;
var today=new Date(),todayStr=fmtD(today),thisWk=getWk(todayStr);

// ── Cloud Storage Layer ────────────────────────────────────────────────────
var STORAGE_KEY="pharmacy-tracker-v1";
var saveTimer=null;
var cloudOK=false;

function setSyncUI(status,msg){
  var bar=document.getElementById("syncBar");
  var dot=document.getElementById("syncDot");
  bar.className="sync-bar "+status;
  document.getElementById("syncMsg").textContent=msg;
  dot.className="sync-dot "+(status==="synced"?"green":status==="error"?"red":"yellow");
}

function getPayload(){
  return JSON.stringify({D:D,FBI:FBI,SM:SM,DRUGS:DRUGS,ET:ET,TM:TM,ts:Date.now()});
}

function applyPayload(p){
  if(p.D)D=p.D;
  if(p.FBI)FBI=p.FBI;
  if(p.SM)SM=p.SM;
  if(p.DRUGS)DRUGS=p.DRUGS;
  if(p.ET)ET=p.ET;
  if(p.TM)TM=p.TM;
}

// localStorage fallback
function lsSave(){try{localStorage.setItem("pet_v1",getPayload());}catch(e){}}
function lsLoad(){try{var r=localStorage.getItem("pet_v1");if(r)applyPayload(JSON.parse(r));}catch(e){}}

async function cloudSave(){
  lsSave();
  if(!cloudOK){setSyncUI("error","Saved locally — cloud not available. Open in Claude.ai for cross-device sync.");return;}
  setSyncUI("saving","Saving to cloud…");
  try{
    var res=await window.storage.set(STORAGE_KEY,getPayload());
    if(res){
      var t=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      setSyncUI("synced","☁ Cloud sync · Last saved: "+t+" · Opens on any browser or device");
    } else {
      setSyncUI("error","Cloud save failed — data saved locally");
    }
  }catch(ex){setSyncUI("error","Cloud error — saved locally");}
}

async function cloudLoad(){
  // Check if cloud storage API is available
  if(typeof window.storage!=="undefined"){
    cloudOK=true;
    setSyncUI("loading","Loading from cloud…");
    try{
      var res=await window.storage.get(STORAGE_KEY);
      if(res&&res.value){
        var cloud=JSON.parse(res.value);
        // Also check localStorage, use whichever is newer
        var lsRaw=localStorage.getItem("pet_v1");
        var lsTs=0;
        try{if(lsRaw)lsTs=JSON.parse(lsRaw).ts||0;}catch(e){}
        if(cloud.ts&&lsTs>cloud.ts){
          // localStorage is newer — apply it and push to cloud
          lsLoad();
          await cloudSave();
        } else {
          applyPayload(cloud);
          lsSave();
          var t=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
          setSyncUI("synced","☁ Loaded from cloud · "+D.length+" entries · Synced across all browsers");
        }
      } else {
        // Nothing in cloud — migrate localStorage if available
        lsLoad();
        if(D.length>0){
          setSyncUI("saving","Migrating existing data to cloud…");
          await cloudSave();
        } else {
          setSyncUI("synced","☁ Cloud ready — start logging errors!");
        }
      }
    }catch(ex){
      cloudOK=false;
      lsLoad();
      setSyncUI("error","Cloud unavailable — using local storage only");
    }
  } else {
    // Not in Claude artifact — use localStorage only
    cloudOK=false;
    lsLoad();
    setSyncUI("error","⚠ Local storage only — open in Claude.ai to enable cross-device cloud sync");
  }
}

// Debounced save — 1.5s after last change
function save(){
  lsSave(); // immediate local save
  if(saveTimer)clearTimeout(saveTimer);
  setSyncUI("saving","Changes pending…");
  saveTimer=setTimeout(function(){cloudSave();},1500);
}

function forceSave(){
  if(saveTimer)clearTimeout(saveTimer);
  cloudSave();
}

function exportData(){
  var blob=new Blob([getPayload()],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="pharmacy-tracker-backup-"+fmtD(new Date())+".json";
  a.click();
}

// ── Nav ────────────────────────────────────────────────────────────────────
var NAVS=[{k:"dashboard",l:"Dashboard"},{k:"summary",l:"Summary"},{k:"trends",l:"Trends"},{k:"staff",l:"Staff"},{k:"member",l:"Member View"},{k:"log",l:"Log Error"},{k:"import",l:"Import"},{k:"entries",l:"All Entries"},{k:"admin",l:"Admin"}];
function buildNav(){var h="";for(var i=0;i<NAVS.length;i++)h+='<button class="'+(NAVS[i].k===curV?"on":"")+'" onclick="goTo(\''+NAVS[i].k+'\')">'+NAVS[i].l+'</button>';document.getElementById("navBar").innerHTML=h;}
function goTo(v){curV=v;var ss=document.querySelectorAll(".sec");for(var i=0;i<ss.length;i++)ss[i].classList.remove("on");document.getElementById("sec-"+v).classList.add("on");buildNav();render(v);}
function render(v){var fn={dashboard:rDash,summary:rSum,trends:rTrend,staff:rStaff,member:rMember,log:rLog,"import":rImport,entries:rEntries,admin:rAdmin};if(fn[v])fn[v]();}
function upHdr(){var sub=getSubset();document.getElementById("hTot").textContent=sub.length;document.getElementById("hPnd").textContent=(D.length-Object.keys(FBI).length)+" Pending";document.getElementById("hMode").textContent=dashMode==="daily"?"Today":dashMode==="weekly"?"This Week":"All Time";}

// ── Dashboard ──────────────────────────────────────────────────────────────
function rDash(){
  var sec=document.getElementById("sec-dashboard");
  var sub=getSubset();
  var human=sub.filter(function(e){return e.source==="Human";}).length;
  var bot=sub.filter(function(e){return e.source==="Bot";}).length;
  var api=sub.filter(function(e){return e.source==="API";}).length;
  var etC={};for(var i=0;i<sub.length;i++){etC[sub[i].errorType]=(etC[sub[i].errorType]||0)+1;}
  var topET="None",topEV=0;for(var k in etC){if(etC[k]>topEV){topEV=etC[k];topET=k;}}
  var tmC={};for(var i2=0;i2<sub.length;i2++){if(sub[i2].source==="Human"&&sub[i2].team)tmC[sub[i2].team]=(tmC[sub[i2].team]||0)+1;}
  var topTM="None",topTV=0;for(var k2 in tmC){if(tmC[k2]>topTV){topTV=tmC[k2];topTM=k2;}}
  var stC={};for(var i3=0;i3<sub.length;i3++){if(sub[i3].who)stC[sub[i3].who]=(stC[sub[i3].who]||0)+1;}
  var topST="None",topSV=0;for(var k3 in stC){if(stC[k3]>topSV){topSV=stC[k3];topST=k3;}}
  var prev=dashMode==="daily"?D.filter(function(e){var yd=new Date(today);yd.setDate(today.getDate()-1);return e.date===fmtD(yd);}):dashMode==="weekly"?D.filter(function(e){return e.week===thisWk-1;}):[];
  var delta=sub.length-prev.length;
  var dStr=delta===0?"Same as last "+(dashMode==="daily"?"day":"week"):delta>0?"+"+delta+" vs last "+(dashMode==="daily"?"day":"week"):delta+" vs last "+(dashMode==="daily"?"day":"week");
  var dCol=delta>0?"#ef4444":delta<0?"#10b981":"#94a3b8";
  var alerts="";
  if(topST!=="None"&&topSV>=3)alerts+='<div class="alert-card"><div style="font-size:11px;font-weight:700;color:#ef4444">HIGH ERROR ALERT</div><div style="font-size:13px;color:#1e293b;margin-top:2px"><strong>'+topST+'</strong> has <strong>'+topSV+'</strong> errors this '+(dashMode==="daily"?"day":"week")+'</div></div>';
  if(topTM!=="None"&&topTV>=4)alerts+='<div class="alert-card warn"><div style="font-size:11px;font-weight:700;color:#f59e0b">TEAM ALERT</div><div style="font-size:13px;color:#1e293b;margin-top:2px"><strong>'+topTM+'</strong> leading with <strong>'+topTV+'</strong> errors</div></div>';
  if(!alerts)alerts='<div class="alert-card good"><div style="font-size:11px;font-weight:700;color:#10b981">ALL CLEAR</div><div style="font-size:13px;color:#1e293b;margin-top:2px">No critical thresholds exceeded.</div></div>';
  var kpis=[{l:"Total Errors",v:sub.length,c:"#6366f1",s:dStr,sc:dCol},{l:"Human",v:human,c:"#3b82f6",s:Math.round(sub.length?human/sub.length*100:0)+"% of total",sc:"#94a3b8"},{l:"Bot",v:bot,c:"#8b5cf6",s:Math.round(sub.length?bot/sub.length*100:0)+"% of total",sc:"#94a3b8"},{l:"API",v:api,c:"#ec4899",s:Math.round(sub.length?api/sub.length*100:0)+"% of total",sc:"#94a3b8"},{l:"Top Error",v:topEV>0?topET:"None",c:"#ef4444",s:topEV>0?topEV+" occurrences":"",sc:"#94a3b8",sm:true},{l:"Top Team",v:topTM,c:TLC[topTM]||"#64748b",s:topTV>0?topTV+" errors":"",sc:"#94a3b8",sm:true},{l:"Top Staff",v:topST,c:"#f97316",s:topSV>0?topSV+" errors":"",sc:"#94a3b8",sm:true}];
  var kh="";for(var ki=0;ki<kpis.length;ki++)kh+='<div class="kpi" style="border-left-color:'+kpis[ki].c+'"><div class="lb">'+kpis[ki].l+'</div><div class="vl" style="font-size:'+(kpis[ki].sm?13:20)+'px;line-height:1.2">'+kpis[ki].v+'</div>'+(kpis[ki].s?'<div class="sub" style="color:'+kpis[ki].sc+'">'+kpis[ki].s+'</div>':'')+'</div>';
  var tD=[];for(var j=0;j<ET.length;j++)tD.push(sub.filter(function(e){return e.errorType===ET[j];}).length);
  var aS=TM.concat(["Bot","API"]),pD=[],pC=[],pL=[];
  for(var k4=0;k4<aS.length;k4++){var cnt=aS[k4]==="Bot"?bot:aS[k4]==="API"?api:sub.filter(function(e){return e.source==="Human"&&e.team===aS[k4];}).length;if(cnt>0){pL.push(aS[k4]);pC.push(TLC[aS[k4]]||"#ccc");pD.push(cnt);}}
  var days=["Mon","Tue","Wed","Thu","Fri"],dayData=[];
  var ws=new Date(today),dow=ws.getDay(),diff=dow===0?6:dow-1;ws.setDate(ws.getDate()-diff);
  for(var d=0;d<5;d++){var dd=new Date(ws);dd.setDate(ws.getDate()+d);dayData.push(D.filter(function(e){return e.date===fmtD(dd);}).length);}
  var period=dashMode==="daily"?"Today":dashMode==="weekly"?"This Week":"All Time";
  var tog='<div class="toggle-group"><button class="tgl'+(dashMode==="daily"?" on":"")+'" onclick="dashMode=\'daily\';upHdr();rDash()">Today</button><button class="tgl'+(dashMode==="weekly"?" on":"")+'" onclick="dashMode=\'weekly\';upHdr();rDash()">This Week</button><button class="tgl'+(dashMode==="cumulative"?" on":"")+'" onclick="dashMode=\'cumulative\';upHdr();rDash()">All Time</button></div>';

  var ds=document.getElementById("lDrugSel").value;
  var drug=ds==="__other__"?document.getElementById("lDrug").value.trim():ds;
  var row={};row.id=mkId();row.date=date;row.week=getWk(date);row.errorType=document.getElementById("lTy").value;row.source=src;row.team=src==="Human"?document.getElementById("lTm").value:"";row.who=src==="Human"?document.getElementById("lWh").value:"";row.faxErx=document.getElementById("lFx").value;row.drug=drug;row.rxNum=document.getElementById("lRx").value.trim();row.notes=document.getElementById("lNt").value;
  D.unshift(row);save();upHdr();rLog();alert("Error logged successfully.");
}

// ── Import ─────────────────────────────────────────────────────────────────
function rImport(){
  document.getElementById("sec-import").innerHTML='<div class="card" style="max-width:640px"><h3 style="font-size:15px;margin-bottom:6px">Import / Load Saved Data</h3><p style="font-size:12px;color:#64748b;margin-bottom:14px">Load a previously exported JSON backup file to restore data from any browser.</p><label class="flb" style="margin-top:0">Load JSON Export File</label><input type="file" accept=".json" id="jsonF" onchange="loadJSON(this)"><hr style="margin:20px 0;border:none;border-top:1px solid #e2e8f0"><h3 style="font-size:15px;margin-bottom:6px">Import via CSV</h3><p style="font-size:12px;color:#64748b;margin-bottom:14px">Columns: date, errorType, source, team, who, faxErx, drug, rxNum, notes</p><label class="flb" style="margin-top:0">Upload CSV File</label><input type="file" accept=".csv" id="csvF" onchange="loadCSVF(this)"><label class="flb">Or Paste Rows</label><textarea id="blkT" rows="6" placeholder="Paste CSV rows here..." style="font-family:monospace;font-size:11px"></textarea><div id="blkM" style="font-size:12px;color:#10b981;font-weight:600;margin:6px 0"></div><button class="btn btn-full" onclick="impBulk()">Import CSV Rows</button></div>';
}
function loadJSON(input){
  var f=input.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var payload=JSON.parse(e.target.result);
      applyPayload(payload);
      save();upHdr();render(curV);
      alert("Data loaded successfully. "+D.length+" entries.");
    }catch(err){alert("Error loading file. Make sure it is a valid export JSON.");}
  };
  r.readAsText(f);
}
function loadCSVF(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){document.getElementById("blkT").value=e.target.result;};r.readAsText(f);}
function impBulk(){
  var lines=document.getElementById("blkT").value.trim().split("\n"),added=0,skipped=0;
  for(var i=0;i<lines.length;i++){var p=lines[i].split(",");if(p.length<3){skipped++;continue;}var date=p[0].trim(),et=p[1].trim(),src=p[2].trim();if(!date||!et||!src){skipped++;continue;}var row={};row.id=mkId();row.date=date;row.week=getWk(date);row.errorType=et;row.source=SR.indexOf(src)>=0?src:"Human";row.team=TM.indexOf((p[3]||"").trim())>=0?(p[3]||"").trim():"";row.who=(p[4]||"").trim();row.faxErx=(p[5]||"").trim();row.drug=(p[6]||"").trim();row.rxNum=(p[7]||"").trim();row.notes=p.slice(8).join(",").trim();D.unshift(row);added++;}
  save();upHdr();
  document.getElementById("blkM").textContent="Added "+added+" entries"+(skipped?", skipped "+skipped+" invalid rows":"");
  document.getElementById("blkT").value="";
}

// ── Edit Modal ─────────────────────────────────────────────────────────────
function openEdit(id){
  var e=null;for(var i=0;i<D.length;i++)if(D[i].id===id){e=D[i];break;}
  if(!e)return;editId=id;
  document.getElementById("eDt").value=e.date||"";
  document.getElementById("eTy").innerHTML=etOpts(e.errorType||"");
  document.getElementById("eSr").innerHTML=srOpts(e.source||"Human");
  document.getElementById("eTm").innerHTML=tmOpts(e.team||"Intake");
  document.getElementById("eWh").innerHTML=whoOpts(e.team||"Intake",e.who||"");
  document.getElementById("eFx").innerHTML=fxOpts(e.faxErx||"");
  document.getElementById("eDrug").innerHTML=drugOpts(e.drug||"");
  document.getElementById("eRx").value=e.rxNum||"";
  document.getElementById("eNt").value=e.notes||"";
  var show=(e.source||"Human")==="Human";
  document.getElementById("eTmW").style.display=show?"block":"none";
  document.getElementById("eWhW").style.display=show?"block":"none";
  document.getElementById("editModal").style.display="block";
}
function closeEdit(){document.getElementById("editModal").style.display="none";editId=null;}
function upEF(){var s=document.getElementById("eSr").value,show=s==="Human";document.getElementById("eTmW").style.display=show?"block":"none";document.getElementById("eWhW").style.display=show?"block":"none";}
function upEW(){var t=document.getElementById("eTm").value;document.getElementById("eWh").innerHTML=whoOpts(t,"");}
function saveEdit(){
  if(!editId)return;
  var src=document.getElementById("eSr").value,date=document.getElementById("eDt").value;
  var ds=document.getElementById("eDrug").value;
  var drug=ds==="__other__"?(prompt("Enter drug name:",""))||"":ds;
  for(var i=0;i<D.length;i++){if(D[i].id===editId){D[i].date=date;D[i].week=getWk(date);D[i].errorType=document.getElementById("eTy").value;D[i].source=src;D[i].team=src==="Human"?document.getElementById("eTm").value:"";D[i].who=src==="Human"?document.getElementById("eWh").value:"";D[i].faxErx=document.getElementById("eFx").value;D[i].drug=drug;D[i].rxNum=document.getElementById("eRx").value.trim();D[i].notes=document.getElementById("eNt").value;break;}}
  save();closeEdit();rEntries();
}

// ── All Entries ────────────────────────────────────────────────────────────
function rEntries(){
  var sec=document.getElementById("sec-entries"),fil=[];
  for(var i=0;i<D.length;i++){var e=D[i];if((eFF==="All"||e.team===eFF||(eFF==="Bot"&&e.source==="Bot")||(eFF==="API"&&e.source==="API"))&&(eFT==="All"||e.errorType===eFT)&&(eFS==="All"||e.source===eFS)&&(eFSt==="All"||(eFSt==="Initials Given"&&!!FBI[e.id])||(eFSt==="Pending"&&!FBI[e.id])))fil.push(e);}
  var ffO='<option'+(eFF==="All"?" selected":"")+'>All</option>';for(var ti=0;ti<TM.length;ti++)ffO+='<option'+(eFF===TM[ti]?" selected":"")+'>'+TM[ti]+'</option>';ffO+='<option'+(eFF==="Bot"?" selected":"")+'>Bot</option><option'+(eFF==="API"?" selected":"")+'>API</option>';
  var ftO='<option'+(eFT==="All"?" selected":"")+'>All</option>';for(var ei2=0;ei2<ET.length;ei2++)ftO+='<option'+(eFT===ET[ei2]?" selected":"")+'>'+ET[ei2]+'</option>';
  var fsO='<option'+(eFS==="All"?" selected":"")+'>All</option>';for(var si2=0;si2<SR.length;si2++)fsO+='<option'+(eFS===SR[si2]?" selected":"")+'>'+SR[si2]+'</option>';
  var rows="",shown=fil.length>300?fil.slice(0,300):fil;
  for(var ri=0;ri<shown.length;ri++){var e2=shown[ri],tc=tyC(e2.errorType),hi=FBI[e2.id],bg=hi?"#f0fdf4":(ri%2===0?"#f8fafc":"#fff");rows+='<tr style="background:'+bg+'"><td style="white-space:nowrap">'+e2.date+'</td><td style="color:#94a3b8">'+e2.week+'</td><td>'+bdg(e2.errorType,tc)+'</td><td>'+bdg(e2.source,TLC[e2.source]||"#6366f1")+'</td><td>'+(e2.team?bdg(e2.team,TLC[e2.team]||"#6366f1"):"")+'</td><td>'+(e2.who||"—")+'</td><td style="color:#64748b">'+(e2.faxErx||"—")+'</td><td style="color:#374151">'+(e2.drug||"—")+'</td><td style="color:#374151">'+(e2.rxNum||"—")+'</td><td style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#94a3b8">'+(e2.notes||"—")+'</td><td>'+(hi?'<span class="bdg" style="background:#dcfce7;color:#16a34a;letter-spacing:1px">'+hi.initials+'</span>':'<input class="ii" maxlength="4" placeholder="Init." onblur="setIE('+e2.id+',this.value)">')+'</td><td style="font-size:11px;color:#64748b;white-space:nowrap">'+(hi?hi.date:"—")+'</td><td style="white-space:nowrap"><button onclick="openEdit('+e2.id+')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #c7d2fe;background:#eef2ff;color:#4f46e5;cursor:pointer;margin-right:3px">Edit</button>'+(hi?'<button onclick="clrI('+e2.id+')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;margin-right:3px">Clear</button>':'')+'<button onclick="delE('+e2.id+')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;cursor:pointer;opacity:.5">Del</button></td></tr>';}
  sec.innerHTML='<div class="card fbar" style="margin-bottom:10px"><label style="font-size:11px;color:#64748b">Team:</label><select onchange="eFF=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px">'+ffO+'</select><label style="font-size:11px;color:#64748b">Type:</label><select onchange="eFT=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px">'+ftO+'</select><label style="font-size:11px;color:#64748b">Source:</label><select onchange="eFS=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px">'+fsO+'</select><label style="font-size:11px;color:#64748b">Status:</label><select onchange="eFSt=this.value;rEntries()" style="width:auto;padding:5px 8px;font-size:11px"><option'+(eFSt==="All"?" selected":"")+'>All</option><option'+(eFSt==="Initials Given"?" selected":"")+'>Initials Given</option><option'+(eFSt==="Pending"?" selected":"")+'>Pending</option></select><span style="font-size:11px;color:#94a3b8;margin-left:auto">'+fil.length+' entries</span></div><div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Week</th><th>Error Type</th><th>Source</th><th>Team</th><th>Who</th><th>Fax/eRx</th><th>Drug</th><th>RX</th><th>Notes</th><th>Lead Initials</th><th>FB Date</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function setIE(id,val){var v=val.trim().toUpperCase();if(v){FBI[id]={initials:v,date:fmtD(new Date())};save();upHdr();rEntries();}}
function clrI(id){delete FBI[id];save();upHdr();rEntries();}
function delE(id){if(!confirm("Delete this entry?"))return;var nl=[];for(var i=0;i<D.length;i++)if(D[i].id!==id)nl.push(D[i]);D=nl;delete FBI[id];save();upHdr();rEntries();}

// ── Admin ──────────────────────────────────────────────────────────────────
function rAdmin(){
  var sec=document.getElementById("sec-admin");
  var etList=ET.map(function(t,i){return'<div class="admin-item"><span style="flex:1;font-size:13px">'+t+'</span><button onclick="removeET('+i+')" style="padding:2px 8px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;border-radius:5px;font-size:11px;cursor:pointer">Remove</button></div>';}).join("");
  var tmList=TM.map(function(t,i){return'<div class="admin-item"><span style="flex:1">'+bdg(t,TLC[t]||"#6366f1")+'</span><button onclick="removeTM('+i+')" style="padding:2px 8px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;border-radius:5px;font-size:11px;cursor:pointer">Remove</button></div>';}).join("");
  var drugList=DRUGS.map(function(d,i){return'<div class="admin-item"><span style="flex:1;font-size:13px">'+d+'</span><button onclick="removeDrug('+i+')" style="padding:2px 8px;border:1px solid #fecaca;background:#fff5f5;color:#ef4444;border-radius:5px;font-size:11px;cursor:pointer">Remove</button></div>';}).join("");
  sec.innerHTML='<p style="font-size:12px;color:#64748b;margin-bottom:14px">Changes here update dropdowns immediately and are saved to cloud automatically.</p><div style="display:flex;gap:12px;flex-wrap:wrap"><div class="card" style="flex:1;min-width:280px"><h3 style="font-size:14px;color:#1e293b;margin-bottom:4px">Error Types</h3><p style="font-size:11px;color:#94a3b8;margin-bottom:10px">Shown in Log Error dropdown</p><div style="display:flex;gap:8px;margin-bottom:12px"><input id="newET" placeholder="New error type" style="flex:1"><button onclick="addET()" class="btn" style="margin-top:0;padding:7px 12px">Add</button></div><div style="max-height:300px;overflow-y:auto">'+etList+'</div></div><div class="card" style="flex:1;min-width:280px"><h3 style="font-size:14px;color:#1e293b;margin-bottom:4px">Teams</h3><p style="font-size:11px;color:#94a3b8;margin-bottom:10px">Available when logging errors</p><div style="display:flex;gap:8px;margin-bottom:12px"><input id="newTM" placeholder="New team name" style="flex:1"><button onclick="addTM()" class="btn" style="margin-top:0;padding:7px 12px">Add</button></div><div style="max-height:300px;overflow-y:auto">'+tmList+'</div></div><div class="card" style="flex:1;min-width:280px"><h3 style="font-size:14px;color:#1e293b;margin-bottom:4px">Drug List</h3><p style="font-size:11px;color:#94a3b8;margin-bottom:10px">Available in drug dropdown</p><div style="display:flex;gap:8px;margin-bottom:12px"><input id="newDrug" placeholder="e.g. Metformin 500mg" style="flex:1"><button onclick="addDrug()" class="btn" style="margin-top:0;padding:7px 12px">Add</button></div><div style="max-height:300px;overflow-y:auto">'+drugList+'</div></div></div>';
}
function addET(){var v=document.getElementById("newET").value.trim();if(!v)return;ET.push(v);save();document.getElementById("newET").value="";rAdmin();}
function removeET(i){if(!confirm("Remove?"))return;ET.splice(i,1);save();rAdmin();}
function addTM(){var v=document.getElementById("newTM").value.trim();if(!v)return;TM.push(v);if(!TLC[v])TLC[v]="#6366f1";save();document.getElementById("newTM").value="";rAdmin();}
function removeTM(i){if(!confirm("Remove?"))return;TM.splice(i,1);save();rAdmin();}
function addDrug(){var v=document.getElementById("newDrug").value.trim();if(!v)return;DRUGS.push(v);save();document.getElementById("newDrug").value="";rAdmin();}
function removeDrug(i){if(!confirm("Remove?"))return;DRUGS.splice(i,1);save();rAdmin();}

// ── Init ───────────────────────────────────────────────────────────────────
async function init(){
  await cloudLoad();
  buildNav();
  upHdr();
  rDash();
}
init();
</script>
